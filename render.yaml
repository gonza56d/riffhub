# Render Blueprint for riffhub — https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub/GitLab, then in Render:
#   Dashboard → New → Blueprint → connect this repo.
# Render reads this file and provisions the web service + Postgres + cron.
# Full walkthrough: deploy/RENDER.md
#
# BEFORE the first deploy, edit the two spots marked "← CHANGE":
#   - the region (put everything in the one closest to your users)
#   - ALLOWED_HOSTS (your real Render URL)

databases:
  - name: riffhub-db
    databaseName: riffhub
    user: riffhub
    region: oregon            # ← CHANGE to your region (must match the services)
    plan: basic-256mb         # ~$6/mo. Verify the current slug/price in the dashboard.

services:
  # --- Web app -------------------------------------------------------------
  - type: web
    name: riffhub
    runtime: python
    region: oregon            # ← CHANGE (same region as the database)
    plan: starter             # ~$7/mo, always-on. (The free tier spins down — not for prod.)
    branch: master
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate"   # runs once per deploy, before traffic shifts
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /
    # User-uploaded images (gear photos, avatars) live on disk. Render's
    # filesystem is otherwise wiped on every deploy, so persist MEDIA_ROOT.
    # mountPath MUST equal MEDIA_ROOT (= <repo>/media on Render).
    disk:
      name: riffhub-media
      mountPath: /opt/render/project/src/media
      sizeGB: 1               # ~$0.25/GB/mo
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true    # Render generates and stores a random key
      - key: DATABASE_URL
        fromDatabase:
          name: riffhub-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: riffhub.onrender.com   # ← CHANGE to your real Render URL (runtime auto-adds the actual host too)
      - key: SECURE_SSL_REDIRECT
        value: "false"         # Render's edge already forces HTTPS; a Django-level
                               # redirect would break the (HTTP) health check.
      - key: WEB_CONCURRENCY
        value: "2"             # gunicorn workers; raise on plans with more RAM

  # --- Hourly sweeper (proposals/submissions) ------------------------------
  # Mirrors the opt-in Docker "scheduler". Cron jobs bill only for the seconds
  # they run (a few seconds/hour ≈ negligible). Remove this block if you'd
  # rather trigger `evaluate_pending` manually.
  - type: cron
    name: riffhub-evaluate
    runtime: python
    region: oregon            # ← CHANGE (same region)
    plan: starter
    schedule: "0 * * * *"     # top of every hour (UTC)
    branch: master
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py evaluate_pending"
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: riffhub-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: riffhub.onrender.com   # ← CHANGE (same as above)
