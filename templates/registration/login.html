{% extends "base.html" %}
{% block title %}Sign in · riffhub{% endblock %}

{% block content %}
<section class="auth-card">
  <h1>Sign in</h1>
  {% if form.errors %}
    <p class="auth-error">That username and password didn't match. Try again.</p>
  {% endif %}
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <label>Username
      <input type="text" name="username" autocomplete="username" autofocus required>
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <input type="hidden" name="next" value="{{ request.GET.next }}">
    <button type="submit" class="btn-primary">Sign in</button>
  </form>
  <p class="auth-note">New here? <a href="{% url 'signup' %}">Create an account</a>.</p>
</section>
{% endblock %}
