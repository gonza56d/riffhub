{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}riffhub{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/riffhub.css' %}">
  <script defer src="{% static 'js/vendor/htmx.min.js' %}"></script>
  <script defer src="{% static 'js/vendor/alpine.min.js' %}"></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="wordmark" href="/">riffhub</a>
      <nav class="site-nav">
        <a href="/" class="active">browse</a>
        <a href="#">forum</a>
        <a href="#">sign in</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">riffhub — a modern-vintage guitar gear &amp; specs database.</div>
  </footer>
</body>
</html>
