services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riffhub}
      POSTGRES_USER: ${POSTGRES_USER:-riffhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riffhub}
    volumes:
      # Postgres 18+ images expect the mount one level up from the old
      # /var/lib/postgresql/data; data lives in a version-specific subdir.
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riffhub} -d ${POSTGRES_DB:-riffhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me}
      DEBUG: ${DEBUG:-True}
      DATABASE_URL: postgres://${POSTGRES_USER:-riffhub}:${POSTGRES_PASSWORD:-riffhub}@db:5432/${POSTGRES_DB:-riffhub}
    depends_on:
      db:
        condition: service_healthy

  # Opt-in periodic evaluator. Not started by a plain `docker compose up`;
  # run it with: `docker compose --profile scheduler up`.
  scheduler:
    build: .
    command: sh -c "while true; do python manage.py evaluate_pending; sleep ${EVAL_INTERVAL_SECONDS:-3600}; done"
    volumes:
      - .:/app
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-me}
      DEBUG: ${DEBUG:-True}
      DATABASE_URL: postgres://${POSTGRES_USER:-riffhub}:${POSTGRES_PASSWORD:-riffhub}@db:5432/${POSTGRES_DB:-riffhub}
      EVAL_INTERVAL_SECONDS: ${EVAL_INTERVAL_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
    profiles: ["scheduler"]

volumes:
  postgres_data:
